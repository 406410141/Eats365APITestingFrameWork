name: API Automation CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:


jobs:
  pytest-testing:
    runs-on: ubuntu-latest

    # 解決你看到的 Node.js 警告（提前進入 Node 24 環境）
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 優先安裝 requirements.txt，如果沒有就安裝核心套件
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest allure-pytest requests python-dotenv

    - name: Run Pytest
      # 這裡執行你的測試指令，並指定結果存放在 allure-results
      run: |
        pytest -v --alluredir=allure-results

    - name: Upload Allure Results
      # 即使測試失敗 (fail) 也要上傳報告結果，否則看不到錯誤訊息
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results-artifact
        path: allure-results
        retention-days: 1
